; opcache ships with PHP core but is off by default - without it, every
; request recompiles the entire framework from source instead of reusing a
; cached bytecode copy, which is real latency on every single API call.
;
; validate_timestamps=0 tells opcache to never recheck source files on disk
; once cached - safe here because each deploy is a brand new container from
; a fresh image build, not a live filesystem PHP source ever mutates after
; boot. If you ever start editing PHP files directly on a running Railway
; instance (you shouldn't), this setting is why they won't take effect
; without a restart.
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.validate_timestamps=0
opcache.save_comments=1
