; Overrides the default pool's process manager settings - the stock image
; ships with pm.max_children=5, which is the actual fix for the outage this
; replaces (php artisan serve handled exactly 1 request at a time; even 5
; concurrent workers is a large improvement, and this leaves headroom for a
; check-in rush without exhausting a small instance's memory).
[www]
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
